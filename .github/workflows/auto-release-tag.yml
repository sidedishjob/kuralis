name: Auto Release Tag

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: "${{ github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'release: v') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract version from PR title
        id: version
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          VERSION="${TITLE#release: }"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.tag }}" "${{ github.event.pull_request.merge_commit_sha }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
